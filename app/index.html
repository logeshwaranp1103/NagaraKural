<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta name="theme-color" content="#4285f4">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nagarakural</title>
    <link rel="shortcut icon" href="icon-192.png" type="image/png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Web Splash Screen -->
<div id="web-splash" class="web-splash-overlay">
    <div class="web-splash-container">
        <img src="nagarakural-logo.png" class="web-splash-logo" alt="Nagarakural Logo">
        <div class="web-splash-title">NagaraKural</div>
        <div class="web-splash-loading">Loading...</div>
    </div>
</div>

<header class="header">
    <div class="header-left">
        <img class="full-logo" src="nagarakural-logo.png" alt="Nagarakural Logo">
    </div>
    <div class="header-actions">
        <button class="lang-btn" id="langToggle">தமிழ்</button>
        <button class="theme-btn" id="themeToggle" aria-label="Toggle theme"></button>
    </div>
</header>

<div id="page-report" class="page-container active">
    <div class="page-inner">
        <div class="page-header">
            <span class="page-eyebrow" data-key="pageEyebrow">Civic Action</span>
            <h2 class="page-title" data-key="reportTitle">Report an Issue</h2>
        </div>
        <div class="form-card">
            <div class="form-group">
                <label class="form-label" data-key="uploadPhoto">Photo</label>
                <div class="photo-upload" id="photoUploadArea">
                    <input type="file" id="issuePhoto" accept="image/*">
                    <div id="photoPlaceholder">
                        <div class="upload-icon-wrap">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/></svg>
                        </div>
                        <span class="upload-label" data-key="tapToUpload">Tap to upload photo</span>
                        <span class="upload-hint">JPG or PNG</span>
                    </div>
                    <img id="photoPreview" class="preview" alt="Preview">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" data-key="category">Category</label>
                <div class="category-grid">
                    <label class="cat-chip"><input type="radio" name="category" value="Road" checked><span class="cat-chip-inner"><span class="cat-icon">🛣️</span><span data-key="catRoad">Road</span></span></label>
                    <label class="cat-chip"><input type="radio" name="category" value="Garbage"><span class="cat-chip-inner"><span class="cat-icon">🗑️</span><span data-key="catGarbage">Garbage</span></span></label>
                    <label class="cat-chip"><input type="radio" name="category" value="Water"><span class="cat-chip-inner"><span class="cat-icon">💧</span><span data-key="catWater">Water</span></span></label>
                    <label class="cat-chip"><input type="radio" name="category" value="Streetlight"><span class="cat-chip-inner"><span class="cat-icon">💡</span><span data-key="catStreetlight">Streetlight</span></span></label>
                    <label class="cat-chip"><input type="radio" name="category" value="Drain"><span class="cat-chip-inner"><span class="cat-icon">🌊</span><span data-key="catDrain">Drain</span></span></label>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label loc-label">
                    <span data-key="location">Location</span>
                    <button type="button" class="gps-btn" onclick="detectLocation()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M1 12h4M19 12h4"/></svg>
                        <span data-key="autoDetect">Auto GPS</span>
                    </button>
                </label>
                <div class="input-wrapper">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z"/><path d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z"/></svg>
                    <input type="text" class="form-control" id="issueLocation" placeholder="Enter landmark or area name" data-ph="locPlaceholder">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" data-key="description">Description <span class="optional-tag">Optional</span></label>
                <textarea class="form-control textarea" id="issueDesc" rows="3" placeholder="Describe the issue..." data-ph="descPlaceholder"></textarea>
            </div>

            <button class="submit-btn" onclick="submitReport()" onkeydown="if(event.key === 'Enter') { submitReport(); event.preventDefault(); }">
                <span data-key="submitBtn">Submit Report</span>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3"/></svg>
            </button>
        </div>
    </div>
</div>

<div id="page-all-reports" class="page-container">
    <div class="page-inner">
        <div class="page-header">
            <span class="page-eyebrow" data-key="communityEyebrow">Community</span>
            <h2 class="page-title" data-key="allReportsTitle">All Reports</h2>
        </div>
        <div class="filter-row">
            <button class="filter-btn active" onclick="filterReports('all', this)" data-key="filterAll">All</button>
            <button class="filter-btn" onclick="filterReports('Pending', this)" data-key="filterPending">Pending</button>
            <button class="filter-btn" onclick="filterReports('Resolved', this)" data-key="filterResolved">Resolved</button>
        </div>
        <div class="cards-list" id="allReportsList"></div>
    </div>
</div>

<div id="page-my-reports" class="page-container">
    <div class="page-inner">
        <div class="page-header">
            <span class="page-eyebrow" data-key="personalEyebrow">Personal</span>
            <h2 class="page-title" data-key="myReportsTitle">My Reports</h2>
        </div>
        <div class="cards-list" id="myReportsList"></div>
    </div>
</div>

<nav class="bottom-nav">
    <div class="nav-item active" onclick="switchTab('report')" id="nav-report">
        <div class="nav-icon-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/></svg>
        </div>
        <span data-key="navReport">Report</span>
    </div>
    <div class="nav-item" onclick="switchTab('all-reports')" id="nav-all-reports">
        <div class="nav-icon-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M8.25 6.75h12M8.25 12h12m-12 5.25h12M3.75 6.75h.007v.008H3.75V6.75zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zM3.75 12h.007v.008H3.75V12zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm-.375 5.25h.007v.008H3.75v-.008zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z"/></svg>
        </div>
        <span data-key="navAllReports">All Reports</span>
    </div>
    <div class="nav-item" onclick="switchTab('my-reports')" id="nav-my-reports">
        <div class="nav-icon-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/></svg>
        </div>
        <span data-key="navMyReports">My Reports</span>
    </div>
</nav>

<div class="toast" id="toast"></div>

<!-- Delete Modal -->
<div class="modal-overlay" id="deleteModal">
    <div class="modal-content">
        <h3 data-key="pinPrompt">Enter PIN to delete:</h3>
        <input type="password" id="deletePinInput" class="form-control" placeholder="PIN" style="margin: 16px 0; text-align: center; letter-spacing: 0.5em; font-size: 1.2rem;" autocomplete="off" onkeypress="if(event.key === 'Enter') confirmDeleteReport()">
        <div style="display: flex; gap: 12px; justify-content: center;">
            <button class="filter-btn" onclick="closeDeleteModal()" data-key="cancelBtn">Cancel</button>
            <button class="submit-btn" style="padding: 10px 24px; background: var(--red); box-shadow: none;" onclick="confirmDeleteReport()" data-key="deleteBtn">Delete</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js').then(reg => console.log('SW registered')).catch(err => console.log('SW error', err));
        });
    }
</script>
</body>
</html>
